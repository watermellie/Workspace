<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="watermellie intern workspace — dashboard, work, personal." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="watermellie" />
  <meta name="theme-color" content="#fcfcfc" />
  <title>🍎 watermellie // workspace</title>

  <!-- red-apple favicon everywhere (SVG emoji; also fixes favicon.ico 404) -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css?v=20" />
</head>

<body>
  <header id="topbar">
    <nav id="nav" aria-label="Primary">
      <a id="brand" href="https://watermellie.com" target="_blank" rel="noopener">watermellie</a>
      <span class="nav-sep">//</span>
      <a class="nav-link" data-route="dashboard" href="#dashboard">dashboard</a>
      <span class="nav-slash">/</span>
      <a class="nav-link" data-route="work" href="#work">work</a>
      <span class="nav-slash">/</span>
      <a class="nav-link" data-route="personal" href="#personal">personal</a>
    </nav>
    <div id="topdate" aria-live="off"></div>
    <div id="topright">
      <button id="search-btn" class="icon-btn" title="Search (press /)" aria-label="Search"></button>
      <button id="sync-btn" title="save to cloud" aria-label="save to cloud" hidden></button>
      <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings"></button>
    </div>
  </header>

  <main id="view"><!-- route content injected here --></main>

  <!-- Mobile bottom tab bar (finger navigation) -->
  <nav id="mobilenav" aria-label="Primary (mobile)">
    <a class="mnav-link nav-link" data-route="dashboard" href="#dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
      <span>dashboard</span>
    </a>
    <a class="mnav-link nav-link" data-route="work" href="#work">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>work</span>
    </a>
    <a class="mnav-link nav-link" data-route="personal" href="#personal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>
      <span>personal</span>
    </a>
  </nav>

  <!-- Generic modal -->
  <div id="modal" hidden>
    <div class="modal-scrim" data-close></div>
    <div class="modal-box" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modal-title">Title</h2>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>

  <script src="app.js?v=20" defer></script>
  <script src="curriculum.js?v=20" defer></script>
</body>
</html>
